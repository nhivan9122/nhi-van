<!DOCTYPE html>
<html lang="vi">
<head>

    <title>Cảm ơn bạn - Tín Hiệu EVA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        evaPink: '#E5217B',
                        evaDarkBlue: '#0A3975',
                        evaSoftBg: '#FDF9FA'
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif']

                }
            }
        }
    </script>

<body class="bg-evaSoftBg min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center border border-pink-50">

            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">Bạn cần hỗ trợ khẩn cấp?</p>
            <div class="flex items-center gap-3">
                <span class="text-xl">📞</span>
                <div>
                    <a href="tel:02871018688" class="text-sm font-bold text-evaDarkBlue hover:text-evaPink transition">0287 101 8688</a>
                    <p class="text-[10px] text-slate-400">Tổng đài hỗ trợ 24/7</p>
                </div>
            </div>
        </div>

        <!-- Nút quay về -->
        <a href="index.html" class="block w-full bg-evaDarkBlue text-white font-bold py-3 rounded-xl text-[12px] uppercase tracking-widest hover:bg-evaPink transition-all duration-300">

</html>
